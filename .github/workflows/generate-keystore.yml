name: Generate Android Keystore (run ONCE)

# Manual trigger only — go to Actions tab → "Generate Android Keystore" → Run workflow.
# This creates your signing key entirely inside GitHub's servers — you never
# run anything on your own computer. Run this exactly once, ever.
on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: "Choose a password for your keystore (write it down — you'll need it for the KEYSTORE_PASSWORD secret in Step 2)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17 (provides keytool)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # keytool is part of the JDK — fully non-interactive when given
      # explicit -storepass/-keypass flags, unlike bubblewrap's prompts.
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias splittab \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.keystore_password }}" \
            -dname "CN=SplitTab, OU=vpradhap, O=vpradhap, L=Unknown, S=Unknown, C=IN"

      - name: Show SHA-256 fingerprint (copy this into assetlinks.json)
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "  COPY THE 'SHA256:' LINE BELOW INTO .well-known/assetlinks.json"
          echo "═══════════════════════════════════════════════════════════"
          keytool -list -v -keystore android.keystore -storepass "${{ inputs.keystore_password }}" -alias splittab | grep "SHA256:"
          echo "═══════════════════════════════════════════════════════════"

      - name: Base64-encode keystore (copy this into KEYSTORE_BASE64 secret)
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "  COPY THE ENTIRE BLOCK BELOW INTO THE KEYSTORE_BASE64 SECRET"
          echo "═══════════════════════════════════════════════════════════"
          base64 -w0 android.keystore
          echo ""
          echo "═══════════════════════════════════════════════════════════"

      # Also upload as a downloadable artifact, in case copy-pasting from
      # the log is inconvenient.
      - name: Upload keystore as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-KEEP-PRIVATE
          path: android.keystore
          retention-days: 7

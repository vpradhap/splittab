name: Build SplitTab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Windows installer via Tauri v2 ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm install

      - name: Prepare frontend
        run: node scripts/build.js

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ── Android TWA APK via Bubblewrap ───────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest's pre-installed Android SDK is unreliable/missing for
      # bubblewrap's validation. Install a known-good SDK explicitly instead.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      # Pre-write bubblewrap's config so it never prompts for JDK/SDK paths.
      - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          echo "JAVA_HOME = $JAVA_HOME"
          echo "ANDROID_HOME = $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT = $ANDROID_SDK_ROOT"
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "── Bubblewrap config ──"
          cat ~/.bubblewrap/config.json
          echo "── Verifying paths exist ──"
          test -d "$JAVA_HOME" && echo "✅ JDK path OK" || echo "❌ JDK path missing"
          test -d "$ANDROID_HOME" && echo "✅ SDK path OK" || echo "❌ SDK path missing"

      # twa-manifest.json's signingKey only holds {path, alias} — never the
      # password (security). Pass both store + key password via --password.
      # yes "no" (capped at 10) still answers the checksum/regenerate prompt.
      - name: Build TWA APK
        run: |
          set -o pipefail
          yes "no" | head -n 10 | bubblewrap build \
            --skipPwaValidation \
            --skipVersionUpgrade \
            --password="${{ secrets.KEYSTORE_PASSWORD }}" \
            2>&1 | tee build.log
          tail -n 80 build.log

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Android
          path: |
            app-release-signed.apk
            app-release.apk

name: Build SplitTab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Windows installer via Tauri v2 ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm install

      - name: Prepare frontend
        run: node scripts/build.js

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ── Android TWA APK via Bubblewrap ───────────────────────────────
  # Uses pre-built twa-manifest.json — no interactive init needed.
  #
  # ONE-TIME LOCAL SETUP before this job works:
  #   1. npx @bubblewrap/cli init --manifest https://vpradhap.github.io/splittab/manifest.json
  #      → note the SHA-256 fingerprint printed at the end
  #      → this creates android.keystore in your folder
  #   2. Paste fingerprint into .well-known/assetlinks.json
  #   3. Push assetlinks.json to GitHub (Pages must redeploy)
  #   4. Add GitHub Secrets:
  #      KEYSTORE_BASE64  → base64 of android.keystore
  #      KEYSTORE_PASSWORD → your keystore password
  # ──────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      # Inject real keystore password into twa-manifest.json
      - name: Configure keystore password
        run: |
          sed -i 's/KEYSTORE_PASS/${{ secrets.KEYSTORE_PASSWORD }}/g' twa-manifest.json

      # bubblewrap build reads twa-manifest.json — no interactive init needed
      - name: Build TWA APK
        run: |
          bubblewrap build \
            --manifest twa-manifest.json \
            --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Android
          path: |
            app-release-signed.apk
            app-release.apk

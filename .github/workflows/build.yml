name: Build SplitTab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed for tauri-action to create GitHub releases

jobs:
  # ── Windows EXE + MSI installer (Tauri) ───────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Rust toolchain is required for Tauri
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cache Rust build artifacts — speeds up subsequent runs from ~8 min → ~2 min
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm install

      # Copy index.html → www/index.html (frontendDist Tauri loads)
      - name: Prepare frontend
        run: node scripts/build.js

      # tauri-action builds both .msi (install wizard) and .exe (NSIS installer)
      # Outputs go to: src-tauri/target/release/bundle/
      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      # Upload both installer types as one artifact
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ── Android TWA APK (Bubblewrap / PWABuilder) ─────────────────────
  # Wraps your live GitHub Pages URL as a native Android app (TWA).
  # No Android Studio or Gradle project needed — bubblewrap handles everything.
  #
  # ONE-TIME SETUP before this job works:
  #   1. Run locally: npx @bubblewrap/cli init --manifest https://vpradhap.github.io/splittab/manifest.json
  #   2. This generates a signing key → note the SHA256 fingerprint it prints
  #   3. Paste that fingerprint into .well-known/assetlinks.json
  #   4. Commit assetlinks.json and push — GitHub Pages will serve it
  #   5. Store the key password in GitHub Secrets as KEYSTORE_PASSWORD
  #   6. Store the base64-encoded keystore file as KEYSTORE_BASE64:
  #        base64 -w0 android.keystore > keystore.b64
  #        (copy the contents into the secret)
  # ─────────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Restore signing keystore from secret
      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      # Init TWA project pointing at the live GitHub Pages URL
      - name: Init TWA project
        run: |
          bubblewrap init \
            --manifest https://vpradhap.github.io/splittab/manifest.json \
            --directory ./twa \
            --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PATH: ${{ github.workspace }}/android.keystore
          BUBBLEWRAP_KEY_ALIAS: splittab
          BUBBLEWRAP_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

      # Build the signed APK
      - name: Build APK
        run: |
          cd twa
          bubblewrap build \
            --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PATH: ${{ github.workspace }}/android.keystore
          BUBBLEWRAP_KEY_ALIAS: splittab
          BUBBLEWRAP_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Android
          path: twa/app-release-signed.apk

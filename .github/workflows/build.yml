name: Build SplitTab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Windows installer via Tauri v2 ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm install

      - name: Prepare frontend
        run: node scripts/build.js

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ── Android APK — hand-built TWA project, built with Gradle directly ──
  # No bubblewrap CLI involved at all (its password prompts can't work in
  # CI — they require a real TTY). android-twa/ is a plain, hand-authored
  # Android project using Google's official androidbrowserhelper library.
  # gradle/actions/setup-gradle installs Gradle itself, so no gradlew
  # wrapper jar needs to be committed to the repo.
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-twa/android.keystore

      # Gradle's own official non-interactive signing override — zero
      # prompts, works in any CI, no bubblewrap/inquirer involved.
      - name: Build APK with Gradle
        working-directory: android-twa
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/android.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="splittab" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitTab-Android
          path: android-twa/app/build/outputs/apk/release/*.apk
